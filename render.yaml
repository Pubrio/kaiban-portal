# One-click deploy on Render (New + → Blueprint → pick this repo).
# Secrets (sync: false) are entered once in the Render dashboard, never in git.
services:
  - type: web
    name: kaiban-portal
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run portal
    envVars:
      - key: LLM_PROVIDER
        value: bedrock
      - key: AWS_REGION
        value: ap-northeast-1
      - key: BEDROCK_MODEL
        value: qwen.qwen3-32b-v1:0
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: WORKSHOP_PASSWORD
        sync: false
      - key: PUBLISH_REPO
        value: Pubrio/todo-list-app
      - key: GITHUB_TOKEN
        sync: false
